services:
  # ── Backend: FastAPI + Interview Bot ────────────────────────────────────────
  backend:
    build: ./Backend
    container_name: int-avatar-bot
    privileged: true
    env_file:
      - ./Backend/.env
    shm_size: "2gb"
    ipc: host
    ports:
      - "4002:8000"    # FastAPI backend
      - "4003:6080"    # noVNC
    environment:
      - DISPLAY=:99
      - PULSE_SERVER=unix:/var/run/pulse/native
      - PULSE_SINK=VirtualMic
      - PULSE_SOURCE=VirtualMicSource

  # ── Frontend: React built → served by Nginx ──────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: int-frontend
    ports:
      - "4001:80"      # Frontend
    volumes:
      - ./Frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
